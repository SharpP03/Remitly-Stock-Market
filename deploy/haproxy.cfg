global
    log stdout format raw local0

defaults
    mode http
    log global
    option httplog
    option redispatch
    retries 2
    timeout connect 3s
    timeout client 30s
    timeout server 30s
    timeout check 1s

frontend stock_market
    bind *:8080
    default_backend stock_market_apps

backend stock_market_apps
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200
    server app1 app1:8080 check inter 1s fall 1 rise 1
    server app2 app2:8080 check inter 1s fall 1 rise 1

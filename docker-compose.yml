services:
  postgres:
    image: postgres:18
    container_name: stockmarket-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-stockmarket}
      # TODO: database variables PASS, USR
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ${DB_NAME:-stockmarket}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

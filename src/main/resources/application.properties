spring.application.name=Remitly-Stock-Market
server.port=${SERVER_PORT:8080}

spring.config.import=optional:file:.env[.properties]
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/stockmarket}
spring.datasource.username=${DB_USER:admin}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

spring.jpa.show-sql=false
spring.jpa.open-in-view=false

app.chaos.enabled=${CHAOS_ENABLED:true}
app.chaos.delay-ms=${CHAOS_DELAY_MS:250}
